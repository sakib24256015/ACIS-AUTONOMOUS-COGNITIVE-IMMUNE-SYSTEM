services:
  - type: web
    name: acis-24256015
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "8080"
      - key: ACIS_ALLOW_PRIVATE_TARGETS
        value: "0"
      - key: ACIS_DB_PATH
        value: /data/acis.db
      - key: ACIS_SECRET_KEY
        generateValue: true
